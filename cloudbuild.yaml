steps:
  # Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/zenforge-backend:latest'
      - './backend'
    id: 'build-backend'

  # Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_BACKEND_URL}'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/zenforge-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  # Build Ollama Image (with pre-pulled gemma:2b model)
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/zenforge-ollama:latest'
      - './ollama'
    id: 'build-ollama'

  # Push all images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/zenforge-backend:latest']
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/zenforge-frontend:latest']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/zenforge-ollama:latest']
    id: 'push-ollama'
    waitFor: ['build-ollama']

substitutions:
  _AR_REGION: 'us-central1'
  _AR_REPO: 'zenforge'
  _BACKEND_URL: 'https://zenforge-backend-756291153394.us-central1.run.app'

timeout: '3600s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
