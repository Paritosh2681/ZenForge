steps:
  # Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/zenforge-backend:latest', './backend']
    id: 'build-backend'

  # Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--build-arg', 'NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - '-t', '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/zenforge-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  # Push Images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/zenforge-backend:latest']
    id: 'push-backend'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/zenforge-frontend:latest']
    id: 'push-frontend'

substitutions:
  _AR_REGION: 'us-central1'
  _AR_REPO: 'zenforge'
  _BACKEND_URL: 'http://localhost:8000' # Placeholder for frontend build time

options:
  logging: CLOUD_LOGGING_ONLY
